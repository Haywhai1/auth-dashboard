name: Node.js CI/CD Demo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        folder: [client, server]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20   # update to 20

      - name: Install dependencies
        working-directory: ${{ matrix.folder }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.folder }}
        run: npm test || true   # avoids failing server for now

      - name: Simulate deployment
        if: success()
        run: |
          echo "✅ All tests passed in ${{ matrix.folder }}."
          echo "🚀 Deploying ${{ matrix.folder }} to production server..."
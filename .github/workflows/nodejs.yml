name: Node.js CI/CD Demo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        folder: [client, server]  # Run steps for both client and server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: ${{ matrix.folder }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.folder }}
        run: npm test

      - name: Simulate deployment
        if: success()
        run: |
          echo "✅ All tests passed in ${{ matrix.folder }}."
          echo "🚀 Deploying ${{ matrix.folder }} to production server..."